<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="90%" height="90%" fill="#f2f2f2"/>

  <!-- Cart -->
  <g fill="#f7931a">
    <rect x="110" y="220" width="120" height="60" rx="10"/>
    <circle cx="140" cy="300" r="12"/>
    <circle cx="180" cy="300" r="12"/>

    <!-- Speed lines -->
    <rect x="70" y="230" width="40" height="6" rx="3"/>
    <rect x="60" y="245" width="50" height="6" rx="3"/>
    <rect x="70" y="260" width="40" height="6" rx="3"/>
  </g>

  <!-- Text -->
  <text x="250" y="260" font-size="48" font-family="Arial, Helvetica, sans-serif" fill="#f36f21">
    Minhas
  </text>
  <text x="250" y="300" font-size="20" font-family="Arial, Helvetica, sans-serif" fill="#333">
    Compras.com
  </text>
</svg>
